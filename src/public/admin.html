<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presenter Controls</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    .status {
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      margin: 24px 0;
      color: #fff;
    }
    .status-label {
      text-align: center;
      color: #999;
      font-size: 14px;
      margin-bottom: 32px;
    }
    button {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn-advance {
      background: #2ecc71;
      color: #fff;
    }
    .btn-advance:hover { background: #27ae60; }
    .btn-advance:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .btn-reset {
      background: #444;
      color: #ccc;
    }
    .btn-reset:hover { background: #555; }
    .info {
      margin-top: 24px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }
    .variants {
      margin-top: 32px;
      border-top: 1px solid #333;
      padding-top: 20px;
    }
    .variants h2 {
      font-size: 14px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .variant-card {
      background: #252525;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .variant-label {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .variant-detail {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .variant-part {
      font-size: 20px;
      font-weight: 700;
      min-width: 48px;
      text-align: right;
    }
    .variant-sync { color: #2ecc71; }
    .variant-lag { color: #f1c40f; }
    .variant-err { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>Presenter Controls</h1>
  <div class="status" id="status">0 / 5</div>
  <div class="status-label">current part</div>
  <button class="btn-advance" id="btn-advance">Advance to Next Part</button>
  <button class="btn-reset" id="btn-reset">Reset</button>
  <div class="info" id="info"></div>
  <div class="variants" id="variants"></div>

  <script>
    const status = document.getElementById('status');
    const btnAdvance = document.getElementById('btn-advance');
    const btnReset = document.getElementById('btn-reset');
    const info = document.getElementById('info');
    const variantsEl = document.getElementById('variants');

    let mainCurrentPart = 0;
    let mainStatus = null;
    const urlParams = new URLSearchParams(window.location.search);
    const secret = urlParams.get('secret') || '';
    const secretQuery = secret ? `?secret=${encodeURIComponent(secret)}` : '';

    async function refresh() {
      try {
        const res = await fetch('/api/admin/status');
        if (!res.ok) throw new Error(`status ${res.status}`);
        const data = await res.json();
        mainCurrentPart = data.currentPart;
        mainStatus = data;
        status.textContent = `${data.currentPart} / ${data.totalParts}`;
        btnAdvance.disabled = data.currentPart >= data.totalParts;
        info.textContent = `${data.sessions} active session${data.sessions !== 1 ? 's' : ''}`;
      } catch {
        info.textContent = 'Status unavailable';
      }
    }

    function formatLabel(style, round) {
      const s = style ? style.charAt(0).toUpperCase() + style.slice(1) : 'Unknown';
      return `Round ${round} ${s}`;
    }

    async function refreshVariants() {
      try {
        const res = await fetch('/api/admin/variant-status');
        if (!res.ok) throw new Error(`status ${res.status}`);
        const data = await res.json();
        if (!data.variants || data.variants.length === 0) {
          variantsEl.style.display = 'none';
          return;
        }
        variantsEl.style.display = '';
        const allVariants = [];
        if (mainStatus) {
          allVariants.push({
            label: formatLabel(mainStatus.style, mainStatus.round) + ' (this instance)',
            ok: true,
            currentPart: mainStatus.currentPart,
            totalParts: mainStatus.totalParts,
            sessions: mainStatus.sessions,
          });
        }
        allVariants.push(...data.variants);
        variantsEl.innerHTML = '<h2>Variants</h2>' + allVariants.map(v => {
          if (!v.ok) {
            return `<div class="variant-card">
              <div><div class="variant-label">${esc(v.label)}</div><div class="variant-detail">error: ${esc(v.error)}</div></div>
              <div class="variant-part variant-err">ERR</div>
            </div>`;
          }
          const syncClass = v.currentPart === mainCurrentPart ? 'variant-sync' : 'variant-lag';
          return `<div class="variant-card">
            <div><div class="variant-label">${esc(v.label)}</div><div class="variant-detail">${v.sessions} session${v.sessions !== 1 ? 's' : ''}</div></div>
            <div class="variant-part ${syncClass}">${v.currentPart} / ${v.totalParts}</div>
          </div>`;
        }).join('');
      } catch {
        variantsEl.innerHTML = '<h2>Variants</h2><div class="variant-card"><div>Status unavailable</div></div>';
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    btnAdvance.addEventListener('click', async () => {
      const res = await fetch(`/api/admin/advance${secretQuery}`, { method: 'POST' });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        info.textContent = body.error || `Error: ${res.status}`;
        info.style.color = '#e74c3c';
        return;
      }
      info.style.color = '';
      refresh();
      refreshVariants();
    });

    btnReset.addEventListener('click', async () => {
      if (confirm('Reset story? All audience sessions will be cleared.')) {
        const res = await fetch(`/api/admin/reset${secretQuery}`, { method: 'POST' });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          info.textContent = body.error || `Error: ${res.status}`;
          info.style.color = '#e74c3c';
          return;
        }
        info.style.color = '';
        refresh();
        refreshVariants();
      }
    });

    refresh();
    refreshVariants();
    setInterval(refresh, 3000);
    setInterval(refreshVariants, 3000);
  </script>
</body>
</html>
